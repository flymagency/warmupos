<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarmupOS — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c5cfc;
      --accent2: #fc5c7c;
      --green: #2dfc8e;
      --yellow: #fcdc2d;
      --text: #e8e8f0;
      --muted: #6b6b88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
    header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; }
    .logo-text span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: 'Syne', sans-serif; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #9b7ffd; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-green { background: rgba(45,252,142,0.15); color: var(--green); border: 1px solid rgba(45,252,142,0.3); }
    .btn-green:hover { background: rgba(45,252,142,0.25); }
    .btn-sm { padding: 7px 14px; font-size: 12px; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 48px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; position: relative; overflow: hidden; }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); opacity:0.5; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; font-family: 'Space Mono', monospace; }
    .stat-value { font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-sub { font-size: 12px; color: var(--muted); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-family: 'Space Mono', monospace; }
    .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .account-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; position: relative; overflow: hidden; transition: all 0.3s; animation: fadeIn 0.4s ease forwards; opacity: 0; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .account-card:hover { border-color: var(--accent); box-shadow: 0 8px 32px rgba(124,92,252,0.1); }
    .account-card.active::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--accent), var(--green)); }
    .account-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .account-name { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    .account-platform { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; display: flex; align-items: center; gap: 6px; }
    .platform-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .status-badge { padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 600; font-family: 'Space Mono', monospace; text-transform: uppercase; }
    .status-badge.active { background: rgba(45,252,142,0.12); color: var(--green); border: 1px solid rgba(45,252,142,0.3); }
    .status-badge.paused { background: rgba(252,220,45,0.12); color: var(--yellow); border: 1px solid rgba(252,220,45,0.3); }
    .last-action { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 16px; }
    .geelark-id { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .account-actions { display: flex; gap: 8px; margin-top: 16px; }
    .warmup-result { margin-top: 10px; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-family: 'Space Mono', monospace; display: none; }
    .warmup-result.success { background: rgba(45,252,142,0.1); color: var(--green); border: 1px solid rgba(45,252,142,0.2); }
    .warmup-result.error { background: rgba(252,92,124,0.1); color: var(--accent2); border: 1px solid rgba(252,92,124,0.2); }
    .loading { text-align: center; padding: 48px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal ajout compte */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; width: 100%; max-width: 440px; }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--accent); }
    .form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; outline: none; cursor: pointer; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .next-cycle { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
    .cycle-info { display: flex; align-items: center; gap: 16px; }
    .cycle-icon { width: 44px; height: 44px; background: rgba(124,92,252,0.12); border: 1px solid rgba(124,92,252,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .cycle-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .cycle-time { font-size: 20px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--accent); }
    .cycle-badge { padding: 8px 20px; background: rgba(124,92,252,0.12); border: 1px solid rgba(124,92,252,0.3); border-radius: 100px; font-size: 12px; color: var(--accent); font-family: 'Space Mono', monospace; }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .accounts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        <div class="logo-text">Warmup<span>OS</span></div>
      </div>
      <div class="header-right">
        <button class="btn btn-ghost btn-sm" onclick="loadAccounts()">↻ Actualiser</button>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Ajouter un compte</button>
        <div class="status-text"><div class="status-dot"></div>Système actif</div>
      </div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Comptes actifs</div>
      <div class="stat-value" style="color:var(--green)" id="statActifs">—</div>
      <div class="stat-sub">en warmup</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total comptes</div>
      <div class="stat-value" style="color:var(--accent)" id="statTotal">—</div>
      <div class="stat-sub">dans Airtable</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Statut système</div>
      <div class="stat-value" style="color:var(--green);font-size:24px">✓ OK</div>
      <div class="stat-sub">aucune erreur</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Prochain cycle</div>
      <div class="stat-value" style="color:var(--yellow);font-size:28px" id="countdown">2:00:00</div>
      <div class="stat-sub">automatique</div>
    </div>
  </div>

  <div class="next-cycle">
    <div class="cycle-info">
      <div class="cycle-icon">⏱</div>
      <div>
        <div class="cycle-label">Prochain warmup automatique dans</div>
        <div class="cycle-time" id="countdown2">—</div>
      </div>
    </div>
    <div class="cycle-badge">Toutes les 2 heures</div>
  </div>

  <div class="section-header">
    <div class="section-title">Comptes Instagram / Threads</div>
  </div>

  <div id="accountsContainer">
    <div class="loading"><div class="loading-spinner"></div>Chargement...</div>
  </div>
</div>

<!-- Modal ajout compte -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">➕ Ajouter un compte</div>
    <div class="form-group">
      <label class="form-label">Nom du compte</label>
      <input class="form-input" id="inputNom" type="text" placeholder="ex: @mon_compte">
    </div>
    <div class="form-group">
      <label class="form-label">ID Geelark</label>
      <input class="form-input" id="inputGeelarkId" type="text" placeholder="ex: 619458412127715622">
    </div>
    <div class="form-group">
      <label class="form-label">Plateforme</label>
      <select class="form-select" id="inputPlateforme">
        <option value="Instagram">Instagram</option>
        <option value="Threads">Threads</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="addAccount()">Ajouter</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<script>
  const API = 'https://weathered-scene-81a4.businessflymagency.workers.dev';

  async function loadAccounts() {
    const container = document.getElementById('accountsContainer');
    container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Chargement depuis Airtable...</div>';
    try {
      const res = await fetch(`${API}/accounts`);
      const data = await res.json();
      const records = data.records || [];
      document.getElementById('statTotal').textContent = records.length;
      document.getElementById('statActifs').textContent = records.length;

      if (records.length === 0) {
        container.innerHTML = '<div class="loading">Aucun compte — ajoutez-en un !</div>';
        return;
      }

      let html = '<div class="accounts-grid">';
      records.forEach((record, i) => {
        const f = record.fields;
        const nom = f['Nom du compte'] || 'Compte ' + (i+1);
        const id = f['ID Geelark'] || '';
        const plateforme = f['Plateforme'] || 'Instagram';
        const derniereAction = f['Dernière action'] || null;
        const statut = f['Statut warmup'] || 'En cours';
        const statusClass = statut === 'Pausé' ? 'paused' : 'active';
        const statusLabel = statut === 'Pausé' ? 'Pausé' : 'Actif';

        html += `
          <div class="account-card active" style="animation-delay:${i*0.1}s">
            <div class="account-header">
              <div>
                <div class="account-name">${nom}</div>
                <div class="account-platform"><div class="platform-dot"></div>${plateforme}</div>
              </div>
              <div class="status-badge ${statusClass}">${statusLabel}</div>
            </div>
            <div class="last-action">Dernière action : ${derniereAction ? derniereAction.split('T')[0] : '—'}</div>
            <div class="account-actions">
              <button class="btn btn-green btn-sm" style="flex:1" onclick="launchWarmup('${id}', '${record.id}', this)">▶ Lancer warmup</button>
            </div>
            <div class="warmup-result" id="result-${record.id}"></div>
            <div class="geelark-id">ID: ${id}</div>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = `<div class="loading" style="color:var(--accent2)">⚠ Erreur: ${err.message}</div>`;
    }
  }

  async function launchWarmup(profileId, recordId, btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Lancement...';
    const resultEl = document.getElementById('result-' + recordId);
    try {
      const res = await fetch(`${API}/warmup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profileId, recordId })
      });
      const data = await res.json();
      resultEl.style.display = 'block';
      if (data.code === 0) {
        resultEl.className = 'warmup-result success';
        resultEl.textContent = '✓ Warmup lancé avec succès !';
        btn.textContent = '✓ Lancé';
      } else {
        resultEl.className = 'warmup-result error';
        resultEl.textContent = '⚠ Erreur: ' + (data.msg || 'Inconnu');
        btn.textContent = '▶ Réessayer';
        btn.disabled = false;
      }
    } catch (err) {
      resultEl.style.display = 'block';
      resultEl.className = 'warmup-result error';
      resultEl.textContent = '⚠ Erreur réseau';
      btn.textContent = '▶ Réessayer';
      btn.disabled = false;
    }
  }

  async function addAccount() {
    const nom = document.getElementById('inputNom').value.trim();
    const geelarkId = document.getElementById('inputGeelarkId').value.trim();
    const plateforme = document.getElementById('inputPlateforme').value;
    if (!nom || !geelarkId) { alert('Remplis tous les champs !'); return; }
    try {
      const res = await fetch(`${API}/add-account`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, geelarkId, plateforme })
      });
      const data = await res.json();
      if (data.id) {
        closeModal();
        loadAccounts();
      } else {
        alert('Erreur lors de l\'ajout');
      }
    } catch (err) {
      alert('Erreur réseau');
    }
  }

  function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
  function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

  // Countdown
  let seconds = 7200;
  function updateCountdown() {
    seconds--;
    if (seconds < 0) seconds = 7200;
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    const f = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('countdown').textContent = f;
    document.getElementById('countdown2').textContent = f;
  }
  setInterval(updateCountdown, 1000);
  updateCountdown();

  loadAccounts();
  setInterval(loadAccounts, 300000);
</script>
</body>
</html>
