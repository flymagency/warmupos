<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarmupOS — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c5cfc;
      --accent2: #fc5c7c;
      --green: #2dfc8e;
      --yellow: #fcdc2d;
      --text: #e8e8f0;
      --muted: #6b6b88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
    header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; }
    .logo-text span { color: var(--accent); }
    .header-status { display: flex; align-items: center; gap: 8px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 48px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; position: relative; overflow: hidden; }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); opacity:0.5; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; font-family: 'Space Mono', monospace; }
    .stat-value { font-size: 36px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-sub { font-size: 12px; color: var(--muted); }
    .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .account-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; position: relative; overflow: hidden; transition: all 0.3s; animation: fadeIn 0.5s ease forwards; opacity: 0; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .account-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,92,252,0.1); }
    .account-card.active::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--accent), var(--green)); }
    .account-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .account-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .account-platform { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; display: flex; align-items: center; gap: 6px; }
    .platform-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .status-badge { padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 600; font-family: 'Space Mono', monospace; text-transform: uppercase; }
    .status-badge.active { background: rgba(45,252,142,0.12); color: var(--green); border: 1px solid rgba(45,252,142,0.3); }
    .status-badge.paused { background: rgba(252,220,45,0.12); color: var(--yellow); border: 1px solid rgba(252,220,45,0.3); }
    .status-badge.stopped { background: rgba(107,107,136,0.12); color: var(--muted); border: 1px solid var(--border); }
    .warmup-progress { margin-bottom: 20px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 8px; }
    .progress-bar { height: 6px; background: var(--surface2); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 1s ease; }
    .account-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .mini-stat { background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; }
    .mini-stat-value { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
    .mini-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .geelark-id { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .loading { text-align: center; padding: 48px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .loading-spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: rgba(252,92,124,0.1); border: 1px solid rgba(252,92,124,0.3); border-radius: 12px; padding: 16px; color: var(--accent2); font-family: 'Space Mono', monospace; font-size: 12px; margin-bottom: 24px; }
    .next-cycle { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
    .cycle-info { display: flex; align-items: center; gap: 16px; }
    .cycle-icon { width: 44px; height: 44px; background: rgba(124,92,252,0.12); border: 1px solid rgba(124,92,252,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .cycle-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .cycle-time { font-size: 20px; font-weight: 800; font-family: 'Space Mono', monospace; color: var(--accent); }
    .cycle-badge { padding: 8px 20px; background: rgba(124,92,252,0.12); border: 1px solid rgba(124,92,252,0.3); border-radius: 100px; font-size: 12px; color: var(--accent); font-family: 'Space Mono', monospace; }
    .refresh-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 16px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .refresh-btn:hover { border-color: var(--accent); color: var(--text); }
    @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } .accounts-grid { grid-template-columns: 1fr; } .header-inner { flex-direction: column; gap: 16px; align-items: flex-start; } }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        <div class="logo-text">Warmup<span>OS</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:16px">
        <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
        <div class="header-status">
          <div class="status-dot"></div>
          Système actif
        </div>
      </div>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Comptes actifs</div>
      <div class="stat-value" style="color: var(--green)" id="statActifs">—</div>
      <div class="stat-sub">comptes warmup</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total comptes</div>
      <div class="stat-value" style="color: var(--accent)" id="statTotal">—</div>
      <div class="stat-sub">dans Airtable</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Statut système</div>
      <div class="stat-value" style="color: var(--green); font-size:24px">✓ OK</div>
      <div class="stat-sub">aucune erreur</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Prochain cycle</div>
      <div class="stat-value" style="color: var(--yellow); font-size: 28px;" id="countdown">2:00:00</div>
      <div class="stat-sub">automatique</div>
    </div>
  </div>

  <div class="next-cycle">
    <div class="cycle-info">
      <div class="cycle-icon">⏱</div>
      <div>
        <div class="cycle-label">Prochain warmup automatique dans</div>
        <div class="cycle-time" id="countdown2">—</div>
      </div>
    </div>
    <div class="cycle-badge">Toutes les 2 heures</div>
  </div>

  <div class="section-title">Comptes Instagram / Threads</div>
  <div id="accountsContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      Chargement depuis Airtable...
    </div>
  </div>

</div>

<script>
  const AIRTABLE_TOKEN = 'patpYL3tWEbvGrpFg.1835fc74c06c1987d62019c90a90e839f17cf1c64d3b76ec45a7fe6b59e5d772';
  const BASE_ID = 'app2JrC2w8MPNPoIS';
  const TABLE_ID = 'tblFaKOS4HuGLCnD6';

  async function loadData() {
    const container = document.getElementById('accountsContainer');
    container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Chargement depuis Airtable...</div>';

    try {
      const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`, {
        headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` }
      });

      if (!res.ok) throw new Error('Erreur API: ' + res.status);

      const data = await res.json();
      const records = data.records;

      document.getElementById('statTotal').textContent = records.length;
      
      const actifs = records.filter(r => {
        const statut = r.fields['Statut warmup'] || '';
        return statut === 'En cours';
      }).length;
      document.getElementById('statActifs').textContent = actifs || records.length;

      let html = '<div class="accounts-grid">';
      records.forEach((record, i) => {
        const f = record.fields;
        const nom = f['Nom du compte'] || 'Compte ' + (i+1);
        const id = f['ID Geelark'] || '—';
        const plateforme = f['Plateforme'] || 'Instagram';
        const statut = f['Statut warmup'] || 'En cours';
        const jour = f['Jour warmup'] || 1;
        const progress = Math.min((jour / 30) * 100, 100).toFixed(0);
        const derniereAction = f['Dernière action'] || '—';

        const statusClass = statut === 'En cours' ? 'active' : statut === 'Pausé' ? 'paused' : 'stopped';
        const statusLabel = statut === 'En cours' ? 'Actif' : statut === 'Pausé' ? 'Pausé' : 'Arrêté';

        html += `
          <div class="account-card ${statusClass}" style="animation-delay: ${i * 0.1}s">
            <div class="account-header">
              <div>
                <div class="account-name">${nom}</div>
                <div class="account-platform">
                  <div class="platform-dot"></div>
                  ${plateforme}
                </div>
              </div>
              <div class="status-badge ${statusClass}">${statusLabel}</div>
            </div>
            <div class="warmup-progress">
              <div class="progress-label">
                <span>Warmup jour ${jour}</span>
                <span>${30 - jour} jours restants</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${progress}%"></div>
              </div>
            </div>
            <div class="account-stats">
              <div class="mini-stat">
                <div class="mini-stat-value" style="color: var(--green)">${jour}</div>
                <div class="mini-stat-label">Jour</div>
              </div>
              <div class="mini-stat">
                <div class="mini-stat-value" style="color: var(--accent)">${statut === 'En cours' ? '✓' : '—'}</div>
                <div class="mini-stat-label">Statut</div>
              </div>
              <div class="mini-stat">
                <div class="mini-stat-value" style="color: var(--yellow); font-size:14px">${derniereAction !== '—' ? derniereAction.split('T')[0] : '—'}</div>
                <div class="mini-stat-label">Dernière action</div>
              </div>
            </div>
            <div class="geelark-id">ID Geelark: ${id}</div>
          </div>
        `;
      });

      html += '</div>';
      container.innerHTML = html;

    } catch (err) {
      container.innerHTML = `<div class="error-msg">⚠ Erreur de chargement: ${err.message}</div>`;
    }
  }

  // Countdown
  let seconds = 7200;
  function updateCountdown() {
    seconds--;
    if (seconds < 0) seconds = 7200;
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    const f = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById('countdown').textContent = f;
    document.getElementById('countdown2').textContent = f;
  }
  setInterval(updateCountdown, 1000);

  // Load on start
  loadData();
  // Reload every 5 minutes
  setInterval(loadData, 300000);
</script>
</body>
</html>
